server {
    listen 8080;
    listen [::]:8080;

    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = / {
        try_files /index.html =404;
    }

    location = /admin/login {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        try_files /admin-login.html =404;
    }

    location = /landlord/login {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        try_files /landlord-login.html =404;
    }

    location = /admin {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        try_files /admin.html =404;
    }

    location = /landlord {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        try_files /landlord.html =404;
    }

    location ^~ /landlord/rooms/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        try_files /room-account.html =404;
    }

    location = /resident {
        add_header Cache-Control "no-store, max-age=0" always;
        try_files /users.html =404;
    }

    location = /users {
        add_header Cache-Control "no-store, max-age=0" always;
        return 308 /resident;
    }

    location = /users/ {
        add_header Cache-Control "no-store, max-age=0" always;
        return 308 /resident;
    }

    location = /user {
        add_header Cache-Control "no-store, max-age=0" always;
        return 308 /resident;
    }

    location = /user/ {
        add_header Cache-Control "no-store, max-age=0" always;
        return 308 /resident;
    }

    location = /manifest.webmanifest {
        expires 1h;
        try_files $uri =404;
    }

    location = /resident-sw.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

