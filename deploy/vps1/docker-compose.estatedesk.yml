services:
  estatedesk_web:
    image: nginx:alpine
    volumes:
      - ${ESTATEDESK_PUBLIC_DIR:-/home/captyn/landlord-housing/public}:/usr/share/nginx/html:ro
      - ${ESTATEDESK_WEB_CONF:-/home/captyn/landlord-housing/deploy/vps1/estatedesk-web.conf}:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    cpus: 0.20
    mem_limit: 128m
    mem_reservation: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O - http://localhost:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - captyn_network

  nginx:
    environment:
      ESTATEDESK_SERVER_NAME: ${ESTATEDESK_SERVER_NAME:?ESTATEDESK_SERVER_NAME must be set}
      ESTATEDESK_WEB_UPSTREAM: http://estatedesk_web:8080
      ESTATEDESK_API_UPSTREAM: ${ESTATEDESK_API_UPSTREAM:?ESTATEDESK_API_UPSTREAM must be set}
      ESTATEDESK_SSL_CERTIFICATE: ${ESTATEDESK_SSL_CERTIFICATE:-/etc/letsencrypt/live/captyn.shop/fullchain.pem}
      ESTATEDESK_SSL_CERTIFICATE_KEY: ${ESTATEDESK_SSL_CERTIFICATE_KEY:-/etc/letsencrypt/live/captyn.shop/privkey.pem}
    volumes:
      - ${ESTATEDESK_NGINX_TEMPLATE:-/home/captyn/landlord-housing/deploy/vps1/estatedesk.vps1.conf.template}:/etc/nginx/templates/estatedesk.conf.template:ro
    depends_on:
      - estatedesk_web

